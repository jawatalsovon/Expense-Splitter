kind = "web"
previewPath = "/"
title = "SplitBD - Expense Splitter"
version = "1.0.0"
id = "artifacts/splitbd"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19185

[services.development]
run = "pnpm --filter @workspace/splitbd run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/splitbd", "run", "build" ]
publicDir = "artifacts/splitbd/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19185"
BASE_PATH = "/"
